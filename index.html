<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>말씀 나눔 도우미</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    textarea, input { font-family: 'Noto Sans KR', sans-serif !important; }
    input:focus, textarea:focus { border-color: #8B6B47 !important; outline: none; }

    @keyframes spin   { to { transform:rotate(360deg); } }

    .tab-bar { -ms-overflow-style:none; scrollbar-width:none; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = "wordlife_gemini_key";
const TABS = ["말씀 입력","나눔 질문","주간 묵상","말씀카드"];

// Gemini API 호출 (gemini-2.0-flash — 무료 티어 지원)
const GEMINI_MODEL = "gemini-2.0-flash";

const SYSTEM_PROMPT = `당신은 개혁주의(Reformed) 칼빈주의 신앙 노선을 따르는 한국 보수 교회의 청년부 사역을 돕는 신학적으로 훈련된 도우미입니다.

[신학적 정체성]
- 성경의 완전 영감과 무오성을 믿으며, 성경만이 신앙과 생활의 유일한 규범(Sola Scriptura)입니다.
- 하나님의 주권적 은혜와 예정을 강조하며, 구원은 오직 은혜(Sola Gratia), 오직 믿음(Sola Fide), 오직 그리스도(Solus Christus)로만 가능합니다.
- 웨스트민스터 신앙고백서와 하이델베르크 요리문답의 신학적 틀을 존중합니다.
- 하나님의 영광(Soli Deo Gloria)이 모든 삶과 신앙의 목적임을 강조합니다.
- 언약 신학(Covenant Theology)의 관점에서 구약과 신약의 연속성을 이해합니다.

[콘텐츠 원칙]
- 성경 본문은 반드시 개역개정판을 기준으로 합니다.
- 나눔 질문은 본문 이해 → 교리적 성찰 → 삶의 적용 순서로 구성합니다.
- 번영신학, 신사도운동, 은사주의적 감성 표현을 지양합니다.
- 하나님 중심적(Theocentric) 관점을 유지합니다.
- 묵상 메시지는 말씀에 기반한 권면이어야 하며, 막연한 긍정 표현을 삼갑니다.
- 반드시 순수 JSON만 반환하고, 마크다운 코드블록 없이 JSON 객체만 반환하세요.`;

/* ── 유틸 ───────────────────────────────────── */
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).catch(() => fallback(text));
  }
  return Promise.resolve(fallback(text));
}
function fallback(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;pointer-events:none;";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}

async function callGemini(apiKey, prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: [{ role: "user", parts: [{ text: prompt }] }],
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 4000,
        responseMimeType: "application/json"  // JSON 모드 — 파싱 안정성 ↑
      }
    })
  });
  const data = await res.json();
  if (!res.ok) {
    const msg = data.error?.message || "API 오류";
    throw new Error(msg);
  }
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  return raw.trim().replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/```\s*$/i,"").trim();
}

/* ── 스타일 상수 ─────────────────────────────── */
const inp = {
  width:"100%", padding:"14px 16px",
  border:"1.5px solid #e8ddd3", borderRadius:10,
  fontSize:14, background:"#faf7f4", color:"#3d2b1f",
  outline:"none", lineHeight:1.7
};
const lbl = {
  display:"block", marginBottom:8,
  color:"#6b4226", fontSize:13,
  fontFamily:"'Noto Serif KR', serif", fontWeight:600
};
const cpyBtn = (active) => ({
  background: active ? "#e8f5e9" : "#faf7f4",
  border: `1.5px solid ${active ? "#81c784" : "#e8ddd3"}`,
  borderRadius:10, padding:"13px", fontSize:13,
  cursor:"pointer", color: active ? "#2e7d32" : "#6b4226",
  fontWeight:600, fontFamily:"'Noto Serif KR', serif",
  transition:"all 0.2s", width:"100%"
});

/* ── 컴포넌트: API Key 설정 화면 ────────────── */
function KeySetup({ onSave }) {
  const [key, setKey]       = useState("");
  const [show, setShow]     = useState(false);
  const [err, setErr]       = useState("");
  const [testing, setTesting] = useState(false);

  const handleSave = async () => {
    const k = key.trim();
    if (!k) { setErr("API Key를 입력해주세요."); return; }
    setErr(""); setTesting(true);
    try {
      // 간단한 테스트 호출로 키 유효성 확인
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${k}`;
      const res = await fetch(url, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ contents:[{role:"user",parts:[{text:"hi"}]}], generationConfig:{maxOutputTokens:5} })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || "인증 실패");
      localStorage.setItem(STORAGE_KEY, k);
      onSave(k);
    } catch(e) {
      setErr(`키 확인 실패: ${e.message}`);
    } finally { setTesting(false); }
  };

  return (
    <div style={{ minHeight:"100vh", background:"#f5f0ea", display:"flex", flexDirection:"column" }}>
      {/* 헤더 */}
      <div style={{ background:"linear-gradient(135deg,#3d2b1f,#6b4226)", padding:"40px 24px 32px", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", top:-40, right:-40, width:200, height:200, borderRadius:"50%", background:"rgba(255,255,255,0.04)" }} />
        <p style={{ color:"#f5e6d0", fontSize:11, marginBottom:8, letterSpacing:"0.2em", opacity:0.7, fontFamily:"'Noto Serif KR', serif" }}>WORD &amp; LIFE</p>
        <h1 style={{ color:"#fff", fontSize:26, fontWeight:700, fontFamily:"'Noto Serif KR', serif" }}>말씀 나눔 도우미</h1>
        <p style={{ color:"#f5e6d0", fontSize:13, marginTop:8, opacity:0.75 }}>청년부 리더를 위한 개혁주의 말씀 자료 생성 도구</p>
      </div>

      <div style={{ padding:"28px 20px", maxWidth:520, margin:"0 auto", width:"100%", display:"flex", flexDirection:"column", gap:20 }}>

        {/* 무료 안내 배지 */}
        <div style={{ background:"linear-gradient(135deg,#e8f5e9,#f1f8e9)", border:"1px solid #a5d6a7", borderRadius:12, padding:"14px 18px", display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:20 }}>🎉</span>
          <div>
            <p style={{ fontSize:13, color:"#2e7d32", fontWeight:700, fontFamily:"'Noto Serif KR', serif" }}>Google Gemini — 무료로 사용 가능</p>
            <p style={{ fontSize:11, color:"#388e3c", marginTop:2 }}>gemini-2.0-flash · 무료 티어 제공</p>
          </div>
        </div>

        {/* 발급 안내 */}
        <div style={{ background:"#fff", borderRadius:16, padding:"22px", border:"1px solid #e8ddd3" }}>
          <p style={{ fontFamily:"'Noto Serif KR', serif", fontSize:15, fontWeight:700, color:"#3d2b1f", marginBottom:16 }}>🔑 API Key 발급 방법 (5분)</p>
          {[
            ["1", "aistudio.google.com 접속"],
            ["2", "구글 계정으로 로그인"],
            ["3", "상단 'Get API Key' 클릭"],
            ["4", "'Create API key' → 키 복사"],
            ["5", "아래에 붙여넣기 후 저장"],
          ].map(([n, txt]) => (
            <div key={n} style={{ display:"flex", gap:12, alignItems:"flex-start", marginBottom:10 }}>
              <span style={{ minWidth:24, height:24, background:"linear-gradient(135deg,#6b4226,#8B6B47)", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:12, fontWeight:700, flexShrink:0 }}>{n}</span>
              <p style={{ fontSize:14, color:"#4a3728", lineHeight:1.6, paddingTop:2 }}>{txt}</p>
            </div>
          ))}
          <a href="https://aistudio.google.com/apikey" target="_blank" style={{ display:"block", marginTop:8, textAlign:"center", background:"#4285f4", color:"#fff", borderRadius:10, padding:"11px", fontSize:14, textDecoration:"none", fontWeight:600, fontFamily:"'Noto Sans KR', sans-serif" }}>
            🔗 Google AI Studio 바로가기
          </a>
        </div>

        {/* 키 입력 */}
        <div style={{ background:"#fff", borderRadius:16, padding:"22px", border:"1px solid #e8ddd3", display:"flex", flexDirection:"column", gap:14 }}>
          <label style={lbl}>Google Gemini API Key</label>
          <div style={{ position:"relative" }}>
            <input
              type={show ? "text" : "password"}
              value={key}
              onChange={e=>setKey(e.target.value)}
              placeholder="AIza..."
              style={{ ...inp, paddingRight:60 }}
            />
            <button onClick={()=>setShow(s=>!s)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"#8B6B47", fontSize:13 }}>
              {show ? "숨김" : "보기"}
            </button>
          </div>

          {err && (
            <div style={{ background:"#fff5f5", border:"1px solid #fcc", borderRadius:10, padding:"12px 14px" }}>
              <p style={{ color:"#c0392b", fontSize:13 }}>⚠ {err}</p>
            </div>
          )}

          <button onClick={handleSave} disabled={testing || !key.trim()} style={{
            background:(testing||!key.trim()) ? "#c4a882" : "linear-gradient(135deg,#6b4226,#8B6B47)",
            color:"#fff", border:"none", borderRadius:12, padding:"15px",
            fontSize:15, fontFamily:"'Noto Serif KR', serif", fontWeight:700,
            cursor:(testing||!key.trim()) ? "not-allowed" : "pointer",
            boxShadow:(testing||!key.trim()) ? "none" : "0 4px 20px rgba(107,66,38,0.3)"
          }}>
            {testing ? "키 확인 중..." : "✦ 저장하고 시작하기"}
          </button>
          <p style={{ fontSize:11, color:"#aaa", textAlign:"center" }}>키는 이 기기의 브라우저에만 저장됩니다</p>
        </div>
      </div>
    </div>
  );
}

/* ── 컴포넌트: 로더 ──────────────────────────── */
function Loader() {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16, padding:"48px 0" }}>
      <div style={{ width:48, height:48, borderRadius:"50%", border:"3px solid #e8e0d5", borderTop:"3px solid #8B6B47", animation:"spin 0.9s linear infinite" }} />
      <p style={{ color:"#8B6B47", fontFamily:"'Noto Serif KR', serif", fontSize:14 }}>말씀을 묵상하는 중...</p>
    </div>
  );
}

/* ── 컴포넌트: 말씀카드 ──────────────────────── */
function WordCard({ verse, title }) {
  const [copied, setCopied] = useState(false);
  const onCopy = () => {
    copyToClipboard(`✦ 이번 주 말씀 (개역개정)\n\n"${verse}"\n\n— ${title}`);
    setCopied(true); setTimeout(()=>setCopied(false), 2000);
  };
  return (
    <div style={{ background:"linear-gradient(135deg,#3d2b1f 0%,#6b4226 50%,#8B6B47 100%)", borderRadius:20, padding:"40px 32px", position:"relative", overflow:"hidden", minHeight:220, display:"flex", flexDirection:"column", justifyContent:"space-between", boxShadow:"0 20px 60px rgba(61,43,31,0.35)" }}>
      <div style={{ position:"absolute", top:-30, right:-30, width:160, height:160, borderRadius:"50%", background:"rgba(255,255,255,0.05)" }} />
      <div style={{ position:"absolute", bottom:-20, left:-20, width:100, height:100, borderRadius:"50%", background:"rgba(255,255,255,0.04)" }} />
      <div>
        <p style={{ color:"#f5e6d0", fontSize:11, marginBottom:16, opacity:0.75, letterSpacing:"0.18em", fontFamily:"'Noto Serif KR', serif" }}>✦ 이번 주 말씀 · 개역개정</p>
        <p style={{ color:"#fff", fontFamily:"'Noto Serif KR', serif", fontSize:17, lineHeight:1.85, marginBottom:20, fontStyle:"italic" }}>"{verse}"</p>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
        <p style={{ color:"#f5e6d0", fontFamily:"'Noto Serif KR', serif", fontSize:12, opacity:0.8 }}>{title}</p>
        <button onClick={onCopy} style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.25)", borderRadius:8, padding:"6px 14px", color:"#fff", fontSize:12, cursor:"pointer" }}>
          {copied ? "✓ 복사됨" : "📋 복사"}
        </button>
      </div>
    </div>
  );
}

/* ── 컴포넌트: 빈 상태 ───────────────────────── */
function Empty({ msg }) {
  return (
    <div style={{ textAlign:"center", padding:"60px 20px", color:"#bbb", fontFamily:"'Noto Serif KR', serif" }}>
      <div style={{ fontSize:40, marginBottom:12 }}>✦</div>
      <p style={{ fontSize:14 }}>{msg}</p>
    </div>
  );
}

/* ── 메인 앱 ─────────────────────────────────── */
function Main({ apiKey, onResetKey }) {
  const [tab, setTab]             = useState(0);
  const [reference, setReference] = useState("");
  const [passage, setPassage]     = useState("");
  const [sTitle, setSTitle]       = useState("");
  const [sPoints, setSPoints]     = useState("");
  const [questions, setQuestions] = useState([]);
  const [meditations, setMeditations] = useState([]);
  const [cardVerse, setCardVerse] = useState("");
  const [loading, setLoading]     = useState(false);
  const [error, setError]         = useState("");
  const [generated, setGenerated] = useState(false);
  const [copiedKey, setCopiedKey] = useState("");

  const handleCopy = (text, key) => {
    copyToClipboard(text);
    setCopiedKey(key);
    setTimeout(()=>setCopiedKey(""), 2000);
  };

  const generate = async () => {
    if (!reference.trim()) { setError("성경 구절을 입력해주세요."); return; }
    if (!passage.trim())   { setError("말씀 본문을 입력해주세요."); return; }
    setError(""); setLoading(true); setGenerated(false);
    try {
      const prompt = `다음 말씀을 바탕으로 개혁주의 신앙에 입각한 청년부 나눔 자료를 만들어주세요.

성경 구절: ${reference}
${sTitle  ? `설교 제목: ${sTitle}` : ""}
${sPoints ? `설교 요지:\n${sPoints}` : ""}

말씀 본문 (개역개정):
${passage}

나눔 질문 4개:
- Q1 본문 이해형: 이 말씀이 무엇을 말하는가
- Q2 신학적 성찰형: 이 본문이 드러내는 하나님은 어떤 분이신가
- Q3 삶의 적용형: 내 삶의 구체적 상황에 어떻게 적용되는가
- Q4 공동체 실천형: 이번 주 셀 안에서 함께 실천할 수 있는 것

월~토 주간 묵상 (각 2~3문장, 하나님 중심, 말씀 기반)
말씀카드용 핵심 구절 1개 (50자 이내)

아래 JSON 형식으로만 응답하세요:
{"questions":["Q1","Q2","Q3","Q4"],"meditations":[{"day":"월","focus":"구절","message":"메시지"},{"day":"화","focus":"구절","message":"메시지"},{"day":"수","focus":"구절","message":"메시지"},{"day":"목","focus":"구절","message":"메시지"},{"day":"금","focus":"구절","message":"메시지"},{"day":"토","focus":"구절","message":"메시지"}],"cardVerse":"핵심구절"}`;

      const raw = await callGemini(apiKey, prompt);
      const parsed = JSON.parse(raw);
      setQuestions(parsed.questions||[]);
      setMeditations(parsed.meditations||[]);
      setCardVerse(parsed.cardVerse||"");
      setGenerated(true); setTab(1);
    } catch(e) {
      setError(`오류: ${e.message || "다시 시도해주세요."}`);
    } finally { setLoading(false); }
  };

  const qTypes  = ["본문 이해","신학적 성찰","삶의 적용","공동체 실천"];
  const qColors = ["#5c4a32","#6b4226","#7a5c38","#8B6B47"];

  const panels = [
    /* 탭 0 — 말씀 입력 */
    <div key="in" style={{ display:"flex", flexDirection:"column", gap:20 }}>
      <div style={{ background:"#fff", border:"1px solid #e8ddd3", borderRadius:12, padding:"14px 18px", display:"flex", alignItems:"center", gap:12 }}>
        <span style={{ fontSize:20 }}>✝</span>
        <div>
          <p style={{ fontSize:12, color:"#6b4226", fontFamily:"'Noto Serif KR', serif", fontWeight:700 }}>개혁주의 · 칼빈주의 신앙 노선</p>
          <p style={{ fontSize:11, color:"#aaa", marginTop:3 }}>Sola Scriptura · 개역개정판 기준 · Soli Deo Gloria</p>
        </div>
      </div>

      <div>
        <label style={lbl}>성경 구절 <span style={{color:"#c0392b"}}>*</span></label>
        <input value={reference} onChange={e=>setReference(e.target.value)} placeholder="예) 아가 2:11-17" style={inp} />
      </div>

      <div>
        <label style={lbl}>말씀 본문 (개역개정) <span style={{color:"#c0392b"}}>*</span></label>
        <textarea value={passage} onChange={e=>setPassage(e.target.value)}
          placeholder={"성경 앱에서 개역개정 본문을 복사해서 붙여넣어 주세요.\n\n예)\n11 겨울도 지나고 비도 그쳤고\n12 지면에는 꽃이 피고..."}
          style={{...inp, minHeight:160, resize:"vertical"}} />
        <p style={{marginTop:6, fontSize:11, color:"#aaa"}}>💡 본문을 직접 붙여넣으면 더 빠르고 정확해요</p>
      </div>

      <div>
        <label style={lbl}>설교 제목 <span style={{color:"#bbb",fontSize:12,fontWeight:400}}>(선택)</span></label>
        <input value={sTitle} onChange={e=>setSTitle(e.target.value)} placeholder="예) 겨울도 지났으니 네 얼굴을 보게 하라" style={inp} />
      </div>

      <div>
        <label style={lbl}>설교 요지 <span style={{color:"#bbb",fontSize:12,fontWeight:400}}>(선택)</span></label>
        <textarea value={sPoints} onChange={e=>setSPoints(e.target.value)}
          placeholder={"예)\n1. 겨울이 지나고 꽃이 핌\n  1) 생명의 역사가 있음\n  2) 일어나서 함께 감"}
          style={{...inp, minHeight:110, resize:"vertical"}} />
      </div>

      {error && (
        <div style={{background:"#fff5f5", border:"1px solid #fcc", borderRadius:10, padding:"12px 16px"}}>
          <p style={{color:"#c0392b", fontSize:13}}>⚠ {error}</p>
        </div>
      )}

      <button onClick={generate} disabled={loading} style={{
        background:loading ? "#c4a882" : "linear-gradient(135deg,#6b4226,#8B6B47)",
        color:"#fff", border:"none", borderRadius:12, padding:"16px",
        fontSize:16, fontFamily:"'Noto Serif KR', serif", fontWeight:700,
        cursor:loading ? "not-allowed" : "pointer",
        boxShadow:loading ? "none" : "0 4px 20px rgba(107,66,38,0.35)"
      }}>
        {loading ? "말씀 자료 생성 중..." : "✦ 말씀 자료 생성하기"}
      </button>
      {loading && <Loader />}

      <button onClick={onResetKey} style={{ background:"none", border:"1px solid #e8ddd3", borderRadius:10, padding:"10px", fontSize:12, color:"#bbb", cursor:"pointer" }}>
        ⚙ API Key 재설정
      </button>
    </div>,

    /* 탭 1 — 나눔 질문 */
    <div key="q" style={{display:"flex",flexDirection:"column",gap:16}}>
      {!generated ? <Empty msg="말씀을 입력하고 생성해주세요" /> : (<>
        {passage && (
          <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e8ddd3"}}>
            <p style={{fontSize:11,color:"#8B6B47",fontWeight:600,letterSpacing:"0.1em",marginBottom:10}}>📖 {reference} · 개역개정</p>
            <p style={{color:"#3d2b1f",fontFamily:"'Noto Serif KR', serif",fontSize:13,lineHeight:2.1,whiteSpace:"pre-line"}}>{passage}</p>
          </div>
        )}
        <p style={{color:"#6b4226",fontFamily:"'Noto Serif KR', serif",fontSize:13,opacity:0.8}}>✦ {reference} 나눔 질문</p>
        {questions.map((q,i)=>(
          <div key={i} style={{background:"#fff",borderRadius:14,padding:"20px 22px",border:"1px solid #e8ddd3",borderLeft:`4px solid ${qColors[i]}`,boxShadow:"0 2px 12px rgba(139,107,71,0.08)",animation:`fadeUp 0.4s ease ${i*0.1}s both`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{minWidth:28,height:28,background:qColors[i],borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700}}>{i+1}</span>
              <span style={{fontSize:11,color:qColors[i],fontWeight:700,letterSpacing:"0.06em"}}>{qTypes[i]}</span>
            </div>
            <p style={{color:"#3d2b1f",fontFamily:"'Noto Serif KR', serif",fontSize:15,lineHeight:1.8}}>{q}</p>
          </div>
        ))}
        <button onClick={()=>{
          const t = questions.map((q,i)=>`[${qTypes[i]}]\nQ${i+1}. ${q}`).join("\n\n");
          handleCopy(`✦ ${reference} 말씀 나눔 질문\n\n${t}`,"questions");
        }} style={cpyBtn(copiedKey==="questions")}>
          {copiedKey==="questions" ? "✓ 복사됨!" : "📋 전체 복사 (카톡 공유용)"}
        </button>
      </>)}
    </div>,

    /* 탭 2 — 주간 묵상 */
    <div key="med" style={{display:"flex",flexDirection:"column",gap:14}}>
      {!generated ? <Empty msg="말씀을 입력하고 생성해주세요" /> : (<>
        <p style={{color:"#6b4226",fontFamily:"'Noto Serif KR', serif",fontSize:13,opacity:0.8}}>✦ {reference} 주간 묵상 가이드</p>
        {meditations.map((m,i)=>(
          <div key={i} style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e8ddd3",boxShadow:"0 2px 12px rgba(139,107,71,0.08)",animation:`fadeUp 0.4s ease ${i*0.08}s both`}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <span style={{background:"linear-gradient(135deg,#6b4226,#8B6B47)",color:"#fff",borderRadius:8,padding:"3px 12px",fontSize:13,fontWeight:700}}>{m.day}요일</span>
              <span style={{color:"#8B6B47",fontSize:13,fontFamily:"'Noto Serif KR', serif",fontStyle:"italic"}}>"{m.focus}"</span>
            </div>
            <p style={{color:"#4a3728",fontFamily:"'Noto Serif KR', serif",fontSize:14,lineHeight:1.85}}>{m.message}</p>
          </div>
        ))}
        <button onClick={()=>{
          const t = meditations.map(m=>`[${m.day}요일 묵상]\n"${m.focus}"\n\n${m.message}`).join("\n\n─────\n\n");
          handleCopy(`✦ ${reference} 주간 묵상\n\n${t}`,"meditations");
        }} style={cpyBtn(copiedKey==="meditations")}>
          {copiedKey==="meditations" ? "✓ 복사됨!" : "📋 전체 복사 (카톡 공유용)"}
        </button>
      </>)}
    </div>,

    /* 탭 3 — 말씀카드 */
    <div key="card" style={{display:"flex",flexDirection:"column",gap:20}}>
      {!generated ? <Empty msg="말씀을 입력하고 생성해주세요" /> : (<>
        <p style={{color:"#6b4226",fontFamily:"'Noto Serif KR', serif",fontSize:13,opacity:0.8}}>✦ 이번 주 말씀카드 · 개역개정</p>
        <WordCard verse={cardVerse} title={reference} />
        <div style={{background:"#fff",borderRadius:14,padding:"20px 22px",border:"1px solid #e8ddd3"}}>
          <p style={{color:"#8B6B47",fontSize:12,marginBottom:10}}>✏ 말씀 직접 수정</p>
          <textarea value={cardVerse} onChange={e=>setCardVerse(e.target.value)} style={{...inp,minHeight:80,fontSize:14}} />
        </div>
        <button onClick={()=>handleCopy(`✦ 이번 주 말씀 (개역개정)\n\n"${cardVerse}"\n\n— ${reference}`,"card")} style={cpyBtn(copiedKey==="card")}>
          {copiedKey==="card" ? "✓ 복사됨!" : "📋 말씀카드 텍스트 복사"}
        </button>
      </>)}
    </div>
  ];

  return (
    <div style={{minHeight:"100vh",background:"#f5f0ea"}}>
      <div style={{background:"linear-gradient(135deg,#3d2b1f,#6b4226)",padding:"32px 24px 24px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:200,height:200,borderRadius:"50%",background:"rgba(255,255,255,0.04)"}} />
        <p style={{color:"#f5e6d0",fontSize:11,marginBottom:6,letterSpacing:"0.2em",opacity:0.7,fontFamily:"'Noto Serif KR', serif"}}>WORD &amp; LIFE</p>
        <h1 style={{color:"#fff",fontSize:24,fontWeight:700,fontFamily:"'Noto Serif KR', serif"}}>말씀 나눔 도우미</h1>
        <p style={{color:"#f5e6d0",fontSize:13,marginTop:8,opacity:0.75}}>청년부 리더를 위한 개혁주의 말씀 자료 생성 도구</p>
      </div>

      <div className="tab-bar" style={{background:"#fff",display:"flex",borderBottom:"1px solid #e8ddd3",overflowX:"auto",position:"sticky",top:0,zIndex:10}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{
            flex:1, padding:"14px 8px", border:"none", background:"none",
            fontSize:13, cursor:"pointer", fontFamily:"'Noto Serif KR', serif",
            color:tab===i?"#6b4226":"#aaa",
            fontWeight:tab===i?700:400,
            borderBottom:tab===i?"2px solid #6b4226":"2px solid transparent",
            transition:"all 0.2s", whiteSpace:"nowrap"
          }}>{t}</button>
        ))}
      </div>

      <div style={{padding:"24px 20px",maxWidth:640,margin:"0 auto"}}>
        {panels[tab]}
      </div>
    </div>
  );
}

/* ── 루트 ────────────────────────────────────── */
function Root() {
  const [apiKey, setApiKey] = useState(null);
  const [ready, setReady]   = useState(false);

  useEffect(()=>{
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) setApiKey(saved);
    setReady(true);
  },[]);

  if (!ready) return null;
  if (!apiKey) return <KeySetup onSave={k=>setApiKey(k)} />;
  return <Main apiKey={apiKey} onResetKey={()=>{ localStorage.removeItem(STORAGE_KEY); setApiKey(null); }} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
